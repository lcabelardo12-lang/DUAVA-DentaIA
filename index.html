<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DentalA - Asistente Dental</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F5F0E8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#F5F0E8;
  height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  color:#4A4540;
}

.chat-header{
  background:#FAF8F5;
  padding:14px 20px;
  display:flex;align-items:center;gap:12px;
  border-bottom:2px solid #8B7355;
  flex-shrink:0;
}
.chat-header img{width:36px;height:36px;border-radius:10px;flex-shrink:0}
.chat-header-info h1{font-size:1em;font-weight:700;color:#4A4540;letter-spacing:.3px;margin:0;line-height:1.2}
.chat-header-info p{font-size:.7em;color:#9E9A93;margin:0}

.chat-messages{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;
  background:#F5F0E8;
}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:#D4C8B8;border-radius:2px}

.msg{max-width:85%;padding:14px 16px;border-radius:16px;font-size:.9em;line-height:1.6;word-wrap:break-word;animation:msgIn .3s ease;white-space:pre-wrap}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg-user{
  background:#8B7355;
  color:#FAF8F5;
  align-self:flex-end;
  border-bottom-right-radius:4px;
}

.msg-ia{
  background:#FFFFFF;
  color:#4A4540;
  align-self:flex-start;
  border-bottom-left-radius:4px;
  border:1px solid #E0DCD4;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.msg-ia .msg-label{font-size:.7em;color:#8B7355;font-weight:600;margin-bottom:6px;display:block}

.msg-error{
  background:#FFF0F0;
  color:#C75B5B;
  border:1px solid rgba(199,91,91,.2);
  align-self:flex-start;
}

.msg-welcome{text-align:center;color:#9E9A93;padding:40px 20px;font-size:.9em;line-height:1.7}
.msg-welcome .icon{font-size:2.5em;margin-bottom:12px;display:block}
.msg-welcome strong{color:#4A4540}

.msg-actions{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}
.msg-action-btn{
  background:rgba(139,115,85,.1);
  border:1px solid rgba(139,115,85,.25);
  color:#8B7355;
  padding:5px 12px;border-radius:8px;font-size:.72em;cursor:pointer;font-weight:600;
}
.msg-action-btn:active{background:rgba(139,115,85,.2)}

.chat-input-area{
  background:#FAF8F5;
  border-top:1px solid #E0DCD4;
  padding:12px 16px;
  flex-shrink:0;
}

.largo-selector{display:flex;gap:6px;margin-bottom:10px;justify-content:center}
.largo-btn{
  padding:6px 14px;border:1.5px solid #D4C8B8;background:transparent;
  border-radius:20px;color:#9E9A93;font-size:.75em;font-weight:600;cursor:pointer;transition:all .2s;
}
.largo-btn.active{background:#8B7355;border-color:#8B7355;color:#FAF8F5}
.largo-btn:active{transform:scale(.95)}

.input-row{display:flex;gap:8px;align-items:flex-end}
.input-field{
  flex:1;background:#FFFFFF;
  border:2px solid #E0DCD4;border-radius:14px;
  padding:12px 16px;color:#4A4540;font-size:.95em;
  font-family:inherit;outline:none;resize:none;
  min-height:48px;max-height:120px;line-height:1.4;transition:border .2s;
}
.input-field:focus{border-color:#8B7355}
.input-field::placeholder{color:#C4BFB8}

.send-btn{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,#8B7355,#6B5B45);
  border:none;color:#FAF8F5;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;
}
.send-btn:active{transform:scale(.93)}
.send-btn:disabled{background:#D4C8B8;cursor:not-allowed}
.send-btn svg{width:22px;height:22px}

.typing{
  display:flex;gap:5px;padding:14px 16px;align-self:flex-start;
  background:#FFFFFF;border-radius:16px;border-bottom-left-radius:4px;
  border:1px solid #E0DCD4;
}
.typing span{width:8px;height:8px;background:#8B7355;border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-4px)}}

.sugerencias{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}
.sug-btn{
  padding:6px 12px;
  background:rgba(139,115,85,.08);
  border:1px solid rgba(139,115,85,.2);
  border-radius:10px;color:#8B7355;font-size:.75em;cursor:pointer;font-weight:500;
}
.sug-btn:active{background:rgba(139,115,85,.2)}
</style>
</head>
<body>

<div class="chat-header">
  <img src="logo.png" alt="DentalA" onerror="this.style.display='none'">
  <div class="chat-header-info">
    <h1>DentalA</h1>
    <p>Asistente Dental DUAVA</p>
  </div>
</div>

<div class="chat-messages" id="chatMessages">
  <div class="msg-welcome">
    <span class="icon"></span>
    <strong>Asistente Dental DUAVA</strong><br><br>
    Hazme preguntas sobre productos odontológicos. Tengo información técnica, indicaciones, contraindicaciones y disponibilidad.
    <div class="sugerencias">
      <button class="sug-btn" onclick="preguntaRapida('żQué resina me recomiendas para posteriores?')">Resinas para posteriores</button>
      <button class="sug-btn" onclick="preguntaRapida('żQué productos tienen de Vigodent?')">Productos Vigodent</button>
      <button class="sug-btn" onclick="preguntaRapida('żTienen Fill Magic en stock?')">Stock Fill Magic</button>
      <button class="sug-btn" onclick="preguntaRapida('żPara qué sirve la resina Fill Magic?')">Indicaciones Fill Magic</button>
    </div>
  </div>
</div>

<div class="chat-input-area">
  <div class="largo-selector">
    <button class="largo-btn" onclick="setLargo('corto',this)">Corta</button>
    <button class="largo-btn active" onclick="setLargo('medio',this)">Media</button>
    <button class="largo-btn" onclick="setLargo('largo',this)">Larga</button>
  </div>
  <div class="input-row">
    <textarea class="input-field" id="inputPregunta" placeholder="Escribe tu pregunta..." rows="1" oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviarPregunta()}"></textarea>
    <button class="send-btn" id="btnEnviar" onclick="enviarPregunta()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUn9Lqb-P5CdoZMkZAQ9ByyQfkSU5yMR0m6XsRwaFDkf2dS3NW46nT35YhTHWEfIOk/exec';
var largoActual = 'medio';

function setLargo(largo, btn) {
  largoActual = largo;
  document.querySelectorAll('.largo-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function preguntaRapida(texto) {
  document.getElementById('inputPregunta').value = texto;
  enviarPregunta();
}

function agregarMsg(texto, tipo) {
  var container = document.getElementById('chatMessages');
  var welcome = container.querySelector('.msg-welcome');
  if (welcome) welcome.remove();

  var div = document.createElement('div');
  div.className = 'msg msg-' + tipo;

  if (tipo === 'ia') {
    div.innerHTML = '<span class="msg-label">DentalA</span>' + texto +
      '<div class="msg-actions"><button class="msg-action-btn" onclick="copiarRespuesta(this)">Copiar</button>' +
      '<button class="msg-action-btn" onclick="compartirWhatsApp(this)">WhatsApp</button></div>';
  } else {
    div.textContent = texto;
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function mostrarTyping() {
  var container = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function ocultarTyping() {
  var el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function enviarPregunta() {
  var input = document.getElementById('inputPregunta');
  var texto = input.value.trim();
  if (!texto) return;

  var btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  agregarMsg(texto, 'user');
  mostrarTyping();

  try {
    var response = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify({pregunta: texto, largo: largoActual}),
      redirect: 'follow'
    });

    var data = await response.json();
    ocultarTyping();

    if (data.success) {
      agregarMsg(formatearTexto(data.respuesta), 'ia');
    } else {
      agregarMsg('Error: ' + (data.error || 'No se pudo obtener respuesta'), 'error');
    }
  } catch (e) {
    ocultarTyping();
    agregarMsg('Error de conexión. Verifica tu internet e intenta de nuevo.', 'error');
  }

  btn.disabled = false;
  input.focus();
}

function formatearTexto(texto) {
  return texto
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function copiarRespuesta(btn) {
  var msg = btn.closest('.msg');
  var clone = msg.cloneNode(true);
  var actions = clone.querySelector('.msg-actions');
  var label = clone.querySelector('.msg-label');
  if (actions) actions.remove();
  if (label) label.remove();
  var texto = clone.textContent.trim();
  navigator.clipboard.writeText(texto).then(function(){
    btn.textContent = 'Copiado';
    setTimeout(function(){btn.textContent = 'Copiar'}, 1500);
  });
}

function compartirWhatsApp(btn) {
  var msg = btn.closest('.msg');
  var clone = msg.cloneNode(true);
  var actions = clone.querySelector('.msg-actions');
  var label = clone.querySelector('.msg-label');
  if (actions) actions.remove();
  if (label) label.remove();
  var texto = clone.textContent.trim();
  window.open('https://wa.me/?text=' + encodeURIComponent(texto), '_blank');
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
</body>
</html>
